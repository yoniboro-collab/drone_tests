name: Drone SITL Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drone-tests:
    name: Run pytest against SITL
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SITL in WSL2
        shell: cmd
        run: wsl bash -c "/mnt/c/drone_tests/start_sitl.sh"

      - name: Debug - verify SITL alive
        shell: cmd
        run: wsl bash -c "echo === Processes === && ps aux | grep -E 'mavproxy|arducopter' | grep -v grep && echo === Port check === && nc -zu 127.0.0.1 14551 && echo PORT 14551 OPEN || echo PORT 14551 CLOSED"

      - name: Install dependencies
        shell: cmd
        run: wsl bash -c "~/drone_venv_38/bin/pip install -r /mnt/c/drone_tests/requirements.txt"

      - name: Run drone tests
        shell: cmd
        run: wsl bash -c "cd /mnt/c/drone_tests && SITL_CONNECTION=udp:127.0.0.1:14551 MAVLINK20=0 ~/drone_venv_38/bin/python -m pytest tests/ -v --html=report.html --self-contained-html --tb=short"

      - name: Stop SITL
        if: always()
        shell: cmd
        run: wsl bash -c "pkill -f arducopter 2>/dev/null; pkill -f mavproxy 2>/dev/null; exit 0"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drone-test-report-${{ github.run_number }}
          path: report.html
          retention-days: 30