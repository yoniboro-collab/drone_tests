name: Drone SITL Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drone-tests:
    name: Run pytest against SITL
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SITL in WSL2
        shell: cmd
        run: wsl bash -c "/mnt/c/drone_tests/start_sitl.sh"

      - name: Debug - verify SITL alive
        shell: cmd
        run: wsl bash -c "echo === Processes === && ps aux | grep -E 'mavproxy|arducopter' | grep -v grep && echo === Port check === && nc -zu 127.0.0.1 14551 && echo PORT 14551 OPEN || echo PORT 14551 CLOSED"

      - name: Install dependencies
        shell: cmd
        run: wsl bash -c "~/drone_venv_38/bin/pip install -r /mnt/c/drone_tests/requirements.txt"

      - name: Run drone tests
        shell: cmd
        run: wsl bash -c "cd /mnt/c/drone_tests && SITL_MODE=local MAVLINK20=0 ~/drone_venv_38/bin/python -m pytest tests/ -v --html=report.html --self-contained-html --tb=short && cp report.html /mnt/c/actions-runner/_work/drone_tests/drone_tests/report.html"

      - name: Stop SITL
        if: always()
        shell: cmd
        run: wsl bash -c "pkill -f arducopter 2>/dev/null; pkill -f mavproxy 2>/dev/null; exit 0" || exit 0

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drone-test-report-${{ github.run_number }}
          path: report.html
          retention-days: 30

  docker-sitl:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: docker-ardupilot-sitl-${{ runner.os }}
          restore-keys: |
            docker-ardupilot-sitl-

      - name: Pull ArduPilot SITL image
        run: |
          docker load -i /tmp/.docker-cache/ardupilot-sitl.tar 2>/dev/null || true
          docker pull radarku/ardupilot-sitl
          mkdir -p /tmp/.docker-cache
          docker save radarku/ardupilot-sitl -o /tmp/.docker-cache/ardupilot-sitl.tar

      - name: Start ArduPilot SITL
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for SITL to be ready
        run: sleep 40

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py38-dronekit

      - name: Install dependencies
        run: |
          python3 -m pip install future
          python3 -m pip install dronekit pymavlink pytest pytest-timeout pytest-html pytest-metadata

      - name: Run drone tests
        env:
          SITL_MODE: docker
          MAVLINK20: "0"
          TELEMETRY_LOG_DIR: /tmp/telemetry_logs
        run: |
          python3 -m pytest tests/ -v --html=report.html --self-contained-html --tb=short

      - name: Stop SITL
        if: always()
        run: docker compose -f docker-compose.yml down

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-report
          path: report.html