name: Drone SITL Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drone-tests:
    name: Run pytest against SITL
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SITL in WSL2
        shell: cmd
        run: wsl bash -c "/mnt/c/drone_tests/start_sitl.sh"

      - name: Install dependencies
        shell: cmd
        run: |
          C:\drone_tests\.venv_38\Scripts\activate.bat && ^
          python -m pip install --upgrade pip && ^
          pip install -r requirements.txt

      - name: Get WSL2 IP
        shell: cmd
        run: |
          wsl bash -c "ip addr show eth0 | grep 'inet ' | awk '{print $2}' | cut -d/ -f1" > wsl_ip.txt
          set /p WSL_IP=<wsl_ip.txt
          echo WSL_IP=%WSL_IP%
          echo WSL_IP=%WSL_IP%>> %GITHUB_ENV%

      - name: Run drone tests
        shell: cmd
        run: |
          C:\drone_tests\.venv_38\Scripts\activate.bat && ^
          python -m pytest tests/ -v ^
            --html=report.html ^
            --self-contained-html ^
            --tb=short
        env:
          MAVLINK20: "0"

      - name: Stop SITL
        if: always()
        shell: cmd
        run: wsl bash -c "pkill -f arducopter || true"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drone-test-report-${{ github.run_number }}
          path: report.html
          retention-days: 30